<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="12" fill="url(#gradient)" />
  
  <!-- Circuit board pattern -->
  <g stroke="url(#circuitGradient)" stroke-width="3" fill="none">
    <!-- Central hub -->
    <rect x="35" y="35" width="30" height="30" rx="4" />
    
    <!-- Horizontal connections -->
    <line x1="0" y1="25" x2="35" y2="25" />
    <line x1="65" y1="25" x2="100" y2="25" />
    <line x1="0" y1="50" x2="35" y2="50" />
    <line x1="65" y1="50" x2="100" y2="50" />
    <line x1="0" y1="75" x2="35" y2="75" />
    <line x1="65" y1="75" x2="100" y2="75" />
    
    <!-- Vertical connections -->
    <line x1="25" y1="0" x2="25" y2="35" />
    <line x1="50" y1="0" x2="50" y2="35" />
    <line x1="75" y1="0" x2="75" y2="35" />
    <line x1="25" y1="65" x2="25" y2="100" />
    <line x1="50" y1="65" x2="50" y2="100" />
    <line x1="75" y1="65" x2="75" y2="100" />
    
    <!-- Corner connections -->
    <path d="M15 15 L25 25" />
    <path d="M85 15 L75 25" />
    <path d="M15 85 L25 75" />
    <path d="M85 85 L75 75" />
    
    <!-- Connection nodes -->
    <circle cx="25" cy="25" r="3" fill="url(#nodeGradient)" />
    <circle cx="75" cy="25" r="3" fill="url(#nodeGradient)" />
    <circle cx="25" cy="75" r="3" fill="url(#nodeGradient)" />
    <circle cx="75" cy="75" r="3" fill="url(#nodeGradient)" />
    <circle cx="50" cy="50" r="5" fill="url(#centerGradient)" />
  </g>
  
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="nodeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="centerGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </radialGradient>
  </defs>
</svg>
